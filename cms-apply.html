<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RehabCMS - HTMLに反映ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      color: #00b4d8;
      margin-bottom: 0.4rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a2f6e;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .step {
      margin-bottom: 1.5rem;
    }
    .step-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.88rem;
      font-weight: 700;
      color: #334155;
      margin-bottom: 0.5rem;
    }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #00b4d8;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-note {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      margin-left: 2rem;
    }
    .file-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .file-zone:hover, .file-zone.drag-over {
      border-color: #00b4d8;
      background: rgba(0,180,216,0.04);
    }
    .file-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .file-zone-icon { font-size: 1.6rem; margin-bottom: 0.3rem; }
    .file-zone-text { font-size: 0.82rem; color: #64748b; }
    .file-selected {
      font-size: 0.8rem;
      color: #00b4d8;
      font-weight: 600;
      margin-top: 0.3rem;
    }
    .btn-apply {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      background: #00b4d8;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .btn-apply:hover { background: #009bbf; }
    .btn-apply:disabled { background: #cbd5e1; cursor: not-allowed; }
    #results { margin-top: 1.5rem; }
    .result-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.84rem;
    }
    .result-ok { background: #f0fdf4; color: #166534; }
    .result-skip { background: #fefce8; color: #854d0e; }
    .result-err { background: #fef2f2; color: #991b1b; }
    .flow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f8fafc;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .flow-step {
      font-size: 0.75rem;
      color: #64748b;
      white-space: nowrap;
    }
    .flow-arrow { color: #cbd5e1; font-size: 0.85rem; }
    .flow-step.active { color: #00b4d8; font-weight: 700; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    RehabCMS
  </div>
  <h1>HTMLに反映ツール</h1>
  <p class="subtitle">編集モードで書き出したJSONを選び、反映したいHTMLファイルを選ぶと<br>更新済みのHTMLが自動でダウンロードされます。</p>

  <div class="flow">
    <span class="flow-step">編集モードで編集</span>
    <span class="flow-arrow">→</span>
    <span class="flow-step">「書き出し」でJSON保存</span>
    <span class="flow-arrow">→</span>
    <span class="flow-step active">このツールで反映</span>
    <span class="flow-arrow">→</span>
    <span class="flow-step">サーバーにアップロード</span>
  </div>

  <!-- ステップ1 -->
  <div class="step">
    <div class="step-label">
      <div class="step-num">1</div>
      書き出したJSONファイルを選択
    </div>
    <p class="step-note">編集モードの「書き出し」ボタンでダウンロードしたファイル</p>
    <div class="file-zone" id="json-zone">
      <input type="file" id="json-input" accept=".json">
      <div class="file-zone-icon">📄</div>
      <div class="file-zone-text">クリックしてJSONファイルを選択</div>
      <div class="file-selected" id="json-name"></div>
    </div>
  </div>

  <!-- ステップ2 -->
  <div class="step">
    <div class="step-label">
      <div class="step-num">2</div>
      反映するHTMLファイルを選択
    </div>
    <p class="step-note">複数選択可（Ctrlを押しながらクリック）</p>
    <div class="file-zone" id="html-zone">
      <input type="file" id="html-input" accept=".html" multiple>
      <div class="file-zone-icon">🗂️</div>
      <div class="file-zone-text">クリックしてHTMLファイルを選択（複数可）</div>
      <div class="file-selected" id="html-names"></div>
    </div>
  </div>

  <button class="btn-apply" id="apply-btn" disabled>反映してHTMLをダウンロード</button>

  <div id="results"></div>
</div>

<script>
  const jsonInput  = document.getElementById('json-input');
  const htmlInput  = document.getElementById('html-input');
  const applyBtn   = document.getElementById('apply-btn');
  const jsonName   = document.getElementById('json-name');
  const htmlNames  = document.getElementById('html-names');
  const resultsDiv = document.getElementById('results');

  let jsonData = null;

  // ファイル選択の表示更新
  jsonInput.addEventListener('change', async () => {
    if (!jsonInput.files[0]) return;
    const text = await readFile(jsonInput.files[0]);
    try {
      jsonData = JSON.parse(text);
      jsonName.textContent = '✓ ' + jsonInput.files[0].name;
      updateBtn();
    } catch(e) {
      jsonName.style.color = '#ef4444';
      jsonName.textContent = '⚠ JSONの形式が正しくありません';
    }
  });

  htmlInput.addEventListener('change', () => {
    const files = Array.from(htmlInput.files);
    if (files.length > 0) {
      htmlNames.textContent = '✓ ' + files.map(f => f.name).join('、');
      updateBtn();
    }
  });

  function updateBtn() {
    applyBtn.disabled = !(jsonData && htmlInput.files.length > 0);
  }

  // 反映処理
  applyBtn.addEventListener('click', async () => {
    resultsDiv.innerHTML = '';
    applyBtn.disabled = true;
    applyBtn.textContent = '処理中...';

    const htmlFiles = Array.from(htmlInput.files);
    let delay = 0;

    for (const htmlFile of htmlFiles) {
      const htmlText = await readFile(htmlFile);
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');

      let applied = 0;
      let skipped = 0;

      for (const [key, value] of Object.entries(jsonData)) {
        if (key.startsWith('_')) continue;
        const el = doc.querySelector('[data-cms="' + key + '"]');
        if (!el) { skipped++; continue; }

        if (el.tagName === 'IMG') {
          el.src = value;
        } else if (el.tagName === 'CANVAS' && el.dataset.cmsType === 'resident-name') {
          // 医員名：親カードのdata-name属性を更新（ページ読込時にcanvas描画される）
          const card = el.closest('.staff-card-compact');
          if (card) card.setAttribute('data-name', value);
        } else {
          el.innerHTML = value;
        }
        applied++;
      }

      if (applied === 0 && skipped > 0) {
        // このHTMLには該当するキーがなかった
        addResult('skip', htmlFile.name, '該当する編集箇所なし（スキップ）');
        continue;
      }

      // HTMLをダウンロード
      const output = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
      setTimeout(() => downloadFile(htmlFile.name, output), delay);
      delay += 300; // 複数ファイルのダウンロードを少しずらす

      addResult('ok', htmlFile.name, applied + ' 箇所を反映しました');
    }

    applyBtn.disabled = false;
    applyBtn.textContent = '反映してHTMLをダウンロード';
  });

  // ユーティリティ
  function readFile(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsText(file, 'UTF-8');
    });
  }

  function downloadFile(filename, content) {
    const blob = new Blob([content], { type: 'text/html; charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function addResult(type, filename, msg) {
    const icons = { ok: '✅', skip: '⏭', err: '❌' };
    const div = document.createElement('div');
    div.className = 'result-item result-' + type;
    div.innerHTML = icons[type] + ' <strong>' + filename + '</strong>：' + msg;
    resultsDiv.appendChild(div);
  }

  // ドラッグ＆ドロップ対応
  ['json-zone', 'html-zone'].forEach(id => {
    const zone = document.getElementById(id);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const input = zone.querySelector('input');
      // DataTransferを使ってinputにファイルをセット
      const dt = new DataTransfer();
      Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
      input.files = dt.files;
      input.dispatchEvent(new Event('change'));
    });
  });
</script>
</body>
</html>
